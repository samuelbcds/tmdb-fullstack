name: tmdb-fullstack

services:
  postgres:
    image: postgres:16-alpine
    container_name: tmdb-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tmdb}
      POSTGRES_USER: ${POSTGRES_USER:-tmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tmdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tmdb} -d ${POSTGRES_DB:-tmdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./tmdb-app
      dockerfile: Dockerfile
    container_name: tmdb-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-development}
      PORT: 5000
      SECRET_KEY: ${SECRET_KEY:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-too}
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI:-postgresql://tmdb:tmdb@postgres:5432/tmdb}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://localhost:5174}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./tmdb-front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-10000}
        VITE_TMDB_API_BASE_URL: ${VITE_TMDB_API_BASE_URL:-https://api.themoviedb.org/3}
        VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY:-}
        VITE_TMDB_BEARER_TOKEN: ${VITE_TMDB_BEARER_TOKEN:-}
    container_name: tmdb-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
