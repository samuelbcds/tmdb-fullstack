[tool.poetry]
name = "tmdb-app"
version = "0.1.0"
description = ""
authors = ["Samuel Baltazar <baltaz.samuel@gmail.com>"]
readme = "README.md"
packages = [{include = "src"}]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.12,<4.0"
flask = ">=3.1.3,<4.0.0"
flask-jwt-extended = ">=4.7.1,<5.0.0"
