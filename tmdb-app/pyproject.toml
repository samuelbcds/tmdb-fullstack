dotenv = ">=0.9.9,<0.10.0"
psycopg2-binary = ">=2.9.0,<3.0.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
